<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #0f3460;
            --accent: #00d4ff;
            --accent-warm: #ff6b6b;
            --success: #00ff88;
            --bg-dark: #0a0e27;
            --surface: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--primary) 50%, var(--secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, #00ffff 50%, var(--accent-warm) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .canvas-section {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }

        .canvas-section:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 80px rgba(0, 212, 255, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas {
            width: 100%;
            height: 350px;
            background: #000000;
            border: 2px solid var(--accent);
            border-radius: 12px;
            cursor: crosshair;
            display: block;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        canvas:hover {
            border-color: #00ffff;
            box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.1), 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00ffff 100%);
            color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--accent-warm);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 107, 107, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .result-section {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 500px;
        }

        .result-content {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-empty {
            color: var(--text-secondary);
            font-size: 16px;
            opacity: 0.6;
        }

        .result-digit {
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--success) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            animation: scaleIn 0.5s ease-out;
        }

        .result-confidence {
            font-size: 28px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .confidence-label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--success) 100%);
            border-radius: 4px;
            transition: width 0.6s ease-out;
            animation: slideRight 0.6s ease-out;
        }

        .predictions-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            animation: slideIn 0.4s ease-out;
            animation-fill-mode: both;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .prediction-digit {
            font-weight: 600;
            color: var(--accent);
            min-width: 30px;
        }

        .prediction-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 15px;
            overflow: hidden;
        }

        .prediction-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--success) 100%);
            border-radius: 3px;
            animation: slideRight 0.6s ease-out;
        }

        .prediction-percent {
            color: var(--text-secondary);
            min-width: 45px;
            text-align: right;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            color: var(--accent);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideRight {
            from { width: 0; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .info-section {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            animation: slideUp 0.8s ease-out 0.4s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar styling */
        .predictions-list::-webkit-scrollbar {
            width: 6px;
        }

        .predictions-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .predictions-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .predictions-list::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">✦ DIGIT READER</div>
            <div class="tagline">Handwritten Digit Recognition By Nausad</div>
        </header>

        <div class="main-content">
            <!-- Canvas Section -->
            <div class="canvas-section">
                <div class="section-title">Draw Here</div>
                <canvas id="drawingCanvas"></canvas>
                <div class="button-group">
                    <button class="btn-primary" id="predictBtn">Predict</button>
                    <button class="btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div class="info-section">
                    ✨ Draw a digit (0-9) using your mouse. Click "Predict" to identify it.
                </div>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                <div class="section-title">Result</div>
                <div class="result-content" id="resultContent">
                    <div class="result-empty">
                        <div style="font-size: 48px; margin-bottom: 10px; opacity: 0.3;">✦</div>
                        <div>Draw a digit and click predict to see the result</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultContent = document.getElementById('resultContent');

        let isDrawing = false;

        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 60; // Account for padding
            canvas.height = 350;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 12;  // Increased from 8 for better strokes
            ctx.strokeStyle = '#FFFFFF';  // White on black for MNIST compatibility
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);  // Black background
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Drawing functions
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        // Clear canvas
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            resultContent.innerHTML = `
                <div class="result-empty">
                    <div style="font-size: 48px; margin-bottom: 10px; opacity: 0.3;">✦</div>
                    <div>Draw a digit and click predict to see the result</div>
                </div>
            `;
        });

        // Predict
        predictBtn.addEventListener('click', async () => {
            const imageData = canvas.toDataURL('image/png');
            
            resultContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Analyzing...</div>
                </div>
            `;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });

                if (!response.ok) {
                    throw new Error('Prediction failed');
                }

                const data = await response.json();
                displayResult(data);
            } catch (error) {
                resultContent.innerHTML = `
                    <div class="result-empty">
                        <div style="color: var(--accent-warm); font-size: 20px;">⚠</div>
                        <div>Error: ${error.message}</div>
                    </div>
                `;
            }
        });

        function displayResult(data) {
            const confidence = data.confidence;
            const digit = data.digit;
            const predictions = data.all_predictions;

            // Sort predictions
            const sortedPredictions = Object.entries(predictions)
                .sort((a, b) => b[1] - a[1]);

            let predictionHtml = '';
            sortedPredictions.forEach((pred, index) => {
                const num = pred[0];
                const percent = pred[1].toFixed(1);
                const delay = index * 0.05;
                predictionHtml += `
                    <div class="prediction-item" style="animation-delay: ${delay}s;">
                        <div class="prediction-digit">${num}</div>
                        <div class="prediction-bar">
                            <div class="prediction-fill" style="width: ${percent}%;"></div>
                        </div>
                        <div class="prediction-percent">${percent}%</div>
                    </div>
                `;
            });

            resultContent.innerHTML = `
                <div>
                    <div class="result-digit">${digit}</div>
                    <div class="result-confidence">${confidence.toFixed(1)}%</div>
                    <div class="confidence-label">Confidence</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidence}%;"></div>
                    </div>
                    <div class="predictions-list">
                        ${predictionHtml}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
